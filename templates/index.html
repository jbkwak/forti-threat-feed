<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Threat Feed Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
{% include "_header.html" %}

<section class="filters">
  <label>날짜
    <input type="date" id="filterDate" list="dateList">
    <datalist id="dateList"></datalist>
  </label>
  <label>출처
    <select id="filterSource">
      <option value="">전체</option>
      <option value="urlhaus">urlhaus</option>
      <option value="openphish">openphish</option>
    </select>
  </label>
  <label>검색
    <input type="text" id="filterQuery" placeholder="URL 일부 검색">
  </label>
  <button id="searchBtn" class="btn-primary">검색</button>
  <button id="resetBtn" class="btn-secondary">초기화</button>
</section>

<section class="actions">
  <span id="selectedCount">0개 선택됨</span>
  <button id="pushBtn" class="btn-primary" disabled>선택 항목 FortiProxy Push</button>
  <button id="vtCheckBtn" class="btn-secondary" disabled>선택 항목 VT 확인 (최대 4개)</button>
  <button id="fgCheckBtn" class="btn-secondary" disabled>선택 항목 FortiGuard 확인 (최대 10개)</button>
</section>

<div id="message" class="message hidden"></div>

<div class="table-scroll">
<table id="urlTable">
  <thead>
    <tr>
      <th><input type="checkbox" id="selectAll"></th>
      <th>URL</th>
      <th>출처</th>
      <th>수집 시각 (KST)</th>
      <th>Push</th>
      <th>VirusTotal</th>
      <th>FortiGuard</th>
    </tr>
  </thead>
  <tbody id="urlTableBody"></tbody>
</table>
</div>

<div class="pagination">
  <button id="prevPage" class="btn-secondary">이전</button>
  <span id="pageInfo"></span>
  <button id="nextPage" class="btn-secondary">다음</button>
</div>

<script src="{{ url_for('static', filename='common.js') }}"></script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
