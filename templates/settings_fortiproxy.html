<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FortiProxy 설정 - Threat Feed Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
{% include "_header.html" %}

<div id="message" class="message hidden"></div>

<section class="panel">
  <h2>FortiProxy 설정</h2>
  <div class="settings-row">
    <span id="fortiStatus" class="status-line"></span>
  </div>
  <div class="settings-row">
    <input type="text" id="fortiHostInput" placeholder="호스트 (예: 192.0.2.10)">
    <input type="password" id="fortiApiKeyInput" placeholder="API Key (Bearer 토큰)">
    <input type="text" id="fortiResourceNameInput" placeholder="External Resource 이름 (예: 3rd_feed)">
    <button id="fortiSaveBtn" class="btn-primary">저장</button>
  </div>
</section>

<script src="{{ url_for('static', filename='common.js') }}"></script>
<script src="{{ url_for('static', filename='settings-fortiproxy.js') }}"></script>
</body>
</html>
